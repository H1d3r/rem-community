<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>No Default Deadline Test</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }
        .container {
            background: #2d2d30;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px solid #3e3e42;
        }
        button {
            padding: 8px 12px;
            margin: 5px;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            background: #0e639c;
            color: white;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        button:hover:not(:disabled) {
            background: #1177bb;
        }
        button:disabled {
            background: #3c3c3c;
            cursor: not-allowed;
        }
        .log {
            background: #0c0c0c;
            color: #00ff00;
            padding: 15px;
            border-radius: 4px;
            font-size: 10px;
            height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid #3e3e42;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            border: 1px solid #3e3e42;
        }
        .success { background: #1e3a1e; color: #4ec94e; }
        .error { background: #3a1e1e; color: #f14c4c; }
        .info { background: #1e2a3a; color: #4c9cf1; }
    </style>
</head>
<body>
    <h1>⏰ No Default Deadline Test</h1>
    
    <div class="container">
        <h2>测试控制</h2>
        <div>
            <button onclick="testNoDefaultDeadline()">测试无默认deadline</button>
            <button onclick="clearLog()">清空日志</button>
        </div>
        <div id="status" class="status info">等待测试...</div>
    </div>

    <div class="container">
        <h2>详细日志 (无默认deadline)</h2>
        <div id="log" class="log">等待日志输出...</div>
    </div>

    <script src="wasm_exec.js"></script>
    <script>
        let wasmReady = false;

        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.textContent += `[${timestamp}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function setStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        function clearLog() {
            document.getElementById('log').textContent = '等待日志输出...\n';
        }

        // 测试无默认deadline的WebSocket
        async function testNoDefaultDeadline() {
            if (!wasmReady) {
                setStatus('WASM模块尚未加载', 'error');
                log('WASM模块尚未准备就绪');
                return;
            }

            log('=== 开始测试无默认deadline的WebSocket ===');
            log('预期行为：连接应该能够长时间保持，不会因为默认timeout而断开');
            
            try {
                const result = await RemDial('-c wasm://127.0.0.1:34996/9LW8CCm4');
                log(`无默认deadline WebSocket连接成功: ${result.agentID}`);
                setStatus('无默认deadline WebSocket连接成功', 'success');
                
                // 等待较长时间观察连接稳定性
                let checkCount = 0;
                const checkInterval = setInterval(() => {
                    checkCount++;
                    log(`=== ${checkCount * 10}秒后检查连接状态 ===`);
                    
                    if (checkCount >= 6) { // 60秒后停止检查
                        clearInterval(checkInterval);
                        log('=== 60秒测试完成，连接应该仍然稳定 ===');
                        setStatus('60秒测试完成，连接稳定', 'success');
                    }
                }, 10000);
                
            } catch (error) {
                log(`无默认deadline WebSocket连接失败: ${error.message}`);
                setStatus(`无默认deadline WebSocket连接失败: ${error.message}`, 'error');
            }
        }

        // 重定向所有console输出到我们的日志
        const originalLog = console.log;
        console.log = function(...args) {
            log('Console: ' + args.join(' '));
            originalLog.apply(console, args);
        };

        const originalError = console.error;
        console.error = function(...args) {
            log('Error: ' + args.join(' '));
            originalError.apply(console, args);
        };

        // Initialize WASM
        const go = new Go();
        setStatus('正在加载WASM模块...', 'info');
        log('开始加载WASM模块...');
        
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
            go.run(result.instance);
            wasmReady = true;
            setStatus('WASM模块已加载', 'success');
            log('WASM模块加载成功，WebSocket默认无deadline');
        }).catch((error) => {
            setStatus(`WASM加载失败: ${error.message}`, 'error');
            log(`WASM加载错误: ${error.message}`);
        });
    </script>
</body>
</html>
