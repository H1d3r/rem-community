<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WASM Debug - Data Flow Control</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }
        .container {
            background: #2d2d30;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px solid #3e3e42;
        }
        input, button {
            padding: 8px 12px;
            margin: 5px;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
        }
        input[type="text"] {
            width: 500px;
        }
        button {
            background: #0e639c;
            color: white;
            cursor: pointer;
        }
        button:hover:not(:disabled) {
            background: #1177bb;
        }
        button:disabled {
            background: #3c3c3c;
            cursor: not-allowed;
        }
        .log {
            background: #0c0c0c;
            color: #00ff00;
            padding: 15px;
            border-radius: 4px;
            font-size: 12px;
            height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid #3e3e42;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            border: 1px solid #3e3e42;
        }
        .success { background: #1e3a1e; color: #4ec94e; }
        .error { background: #3a1e1e; color: #f14c4c; }
        .info { background: #1e2a3a; color: #4c9cf1; }
        .warning { background: #3a2e1e; color: #f1c94c; }
    </style>
</head>
<body>
    <h1>🐛 WASM Debug - 数据流控制</h1>
    
    <div class="container">
        <h2>连接控制</h2>
        <div>
            <input type="text" id="cmdline" value="-c wasm://localhost:8080/ws" placeholder="命令行参数">
        </div>
        <div>
            <button id="connectBtn" onclick="testConnect()">建立连接</button>
            <button id="disconnectBtn" onclick="testDisconnect()" disabled>断开连接</button>
        </div>
        <div id="status" class="status info">等待操作...</div>
    </div>

    <div class="container">
        <h2>数据发送测试</h2>
        <div>
            <input type="text" id="testData" value="Hello WASM" placeholder="测试数据">
            <button onclick="sendTestData()">发送测试数据</button>
        </div>
        <div>
            <button onclick="sendLogin()">发送Login消息</button>
            <button onclick="sendPing()">发送Ping消息</button>
        </div>
    </div>

    <div class="container">
        <h2>调试日志</h2>
        <div id="log" class="log">等待日志输出...</div>
        <button onclick="clearLog()">清空日志</button>
    </div>

    <script src="wasm_exec.js"></script>
    <script>
        let wasmReady = false;
        let currentConnection = null;

        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.textContent += `[${timestamp}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function setStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        function clearLog() {
            document.getElementById('log').textContent = '等待日志输出...\n';
        }

        async function testConnect() {
            if (!wasmReady) {
                setStatus('WASM模块尚未加载', 'error');
                return;
            }

            const cmdline = document.getElementById('cmdline').value.trim();
            if (!cmdline) {
                setStatus('请输入命令行参数', 'error');
                return;
            }

            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            
            connectBtn.disabled = true;
            setStatus('正在建立连接...', 'info');
            log(`开始连接: ${cmdline}`);

            try {
                const result = await RemDial(cmdline);
                log(`连接成功: ${result.agentID}`);
                setStatus('连接已建立', 'success');
                
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                currentConnection = result;
            } catch (error) {
                log(`连接失败: ${error.message}`);
                setStatus(`连接失败: ${error.message}`, 'error');
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
            }
        }

        function testDisconnect() {
            if (currentConnection && currentConnection.agentID) {
                try {
                    const result = RemClose(currentConnection.agentID);
                    if (result.success) {
                        log(`连接已关闭: ${currentConnection.agentID}`);
                        setStatus('连接已断开', 'info');
                    } else {
                        log(`关闭失败: ${result.error}`);
                        setStatus('断开失败', 'error');
                    }
                } catch (error) {
                    log(`断开错误: ${error.message}`);
                    setStatus('断开错误', 'error');
                }
                currentConnection = null;
            }
            
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('disconnectBtn').disabled = true;
        }



        function sendTestData() {
            const testData = document.getElementById('testData').value;
            log(`发送测试数据: ${testData}`);
            // 这里需要添加发送数据的逻辑
        }

        function sendLogin() {
            log('发送Login消息...');
            // 这里需要添加发送Login消息的逻辑
        }

        function sendPing() {
            log('发送Ping消息...');
            // 这里需要添加发送Ping消息的逻辑
        }

        // 重定向console.log到我们的日志
        const originalLog = console.log;
        console.log = function(...args) {
            log('Console: ' + args.join(' '));
            originalLog.apply(console, args);
        };

        // Initialize WASM
        const go = new Go();
        setStatus('正在加载WASM模块...', 'info');
        log('开始加载WASM模块...');
        
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
            go.run(result.instance);
            wasmReady = true;
            setStatus('WASM模块已加载', 'success');
            log('WASM模块加载成功');
        }).catch((error) => {
            setStatus(`WASM加载失败: ${error.message}`, 'error');
            log(`WASM加载错误: ${error.message}`);
        });
    </script>
</body>
</html>
